<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Aveti Transcripts{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Literata:opsz,wght@7..72,600;7..72,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">
      <span class="brand-mark">A</span>
      <span>Aveti Transcripts</span>
    </a>
    <a class="header-link" href="/docs">API docs</a>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer>Built for structured, searchable learning transcripts.</footer>
  {% block scripts %}{% endblock %}
</body>
</html>
