<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Aveti Transcripts{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">
      <span class="brand-mark">A</span>
      <span>Aveti Transcripts</span>
    </a>
    <nav class="header-nav">
      <a class="header-link" href="/admin/jobs">Admin jobs</a>
      <a class="header-link" href="/docs">API docs</a>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer>Built for structured, searchable learning transcripts.</footer>
  {% block scripts %}{% endblock %}
</body>
</html>
